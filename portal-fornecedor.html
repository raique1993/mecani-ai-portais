<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Fornecedor — Mecani.AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f0f0f;--bg1:#161616;--bg2:#1f1f1f;--bg3:#2a2a2a;--t1:#f5f5f3;--t2:#aaa;--t3:#666;--accent:#f59e0b;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--bg3)}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--accent)}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg2);padding:8px 14px;border-radius:100px;font-size:13px;color:var(--t2)}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.tabs{display:flex;gap:2px;padding:16px 24px 0;border-bottom:1px solid var(--bg3)}
.tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--t1);border-color:var(--accent)}
.content{max-width:900px;margin:0 auto;padding:24px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:16px}
.metric-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-val{font-size:24px;font-weight:700}
.metric-sub{font-size:12px;color:var(--t3);margin-top:4px}
.section-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.cotacao-card{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:border-color .2s}
.cotacao-card.nova{border-color:var(--accent);animation:flash 2s ease}
@keyframes flash{0%,100%{border-color:var(--accent)}50%{border-color:#f59e0b88;box-shadow:0 0 20px rgba(245,158,11,.2)}}
.cotacao-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.cotacao-titulo{font-size:15px;font-weight:600}
.cotacao-meta{font-size:12px;color:var(--t3);margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-nova{background:rgba(245,158,11,.15);color:var(--accent)}
.badge-respondida{background:rgba(34,197,94,.15);color:var(--green)}
.badge-expirada{background:rgba(107,114,128,.15);color:var(--t3)}
.pecas-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.peca-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg2);border-radius:8px}
.peca-nome{flex:1;font-size:14px}
.peca-qtd{font-size:12px;color:var(--t3);min-width:40px}
.peca-input{width:110px;padding:7px 10px;background:var(--bg3);border:1px solid #3a3a3a;border-radius:6px;color:var(--t1);font-size:14px;text-align:right;outline:none}
.peca-input:focus{border-color:var(--accent)}
.peca-prazo{width:90px;padding:7px 10px;background:var(--bg3);border:1px solid #3a3a3a;border-radius:6px;color:var(--t1);font-size:13px;outline:none}
.peca-prazo:focus{border-color:var(--accent)}
.resp-total{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:12px;background:var(--bg2);border-radius:8px}
.resp-total-label{font-size:13px;color:var(--t2)}
.resp-total-val{font-size:18px;font-weight:700;color:var(--accent)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#d97706}
.btn-secondary{background:var(--bg3);color:var(--t2)}
.btn-row{display:flex;gap:8px;justify-content:flex-end}
.score-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.score-fill{height:100%;background:linear-gradient(90deg,var(--green),#16a34a);border-radius:3px;transition:width .5s}
.empty{text-align:center;padding:60px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--bg1);border:1px solid var(--bg3);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center}
.login-title{font-size:24px;font-weight:700;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--t3);margin-bottom:32px}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:12px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;color:var(--t1);font-size:15px;outline:none}
.field input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.catalogo-form{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;margin-bottom:16px}
.catalogo-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg3)}
.catalogo-row:last-child{border:none}
.spinner{width:32px;height:32px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Mecani<span>.AI</span> <span style="font-size:12px;color:var(--t3);font-weight:400">— Portal Fornecedor</span></div>
  <div class="user-pill" id="user-pill" style="display:none">
    <div class="avatar" id="user-avatar">F</div>
    <span id="user-name">Fornecedor</span>
  </div>
</div>

<div id="app"><div class="spinner"></div></div>

<script>
const SB_URL='https://tcjynyfusqkqtdohnyzq.supabase.co';
const SB_KEY='sb_publishable_gNJhc4WCS9MnnmDAL2T6Vg_AQ71_Vid';
const{createClient}=supabase;
const sb=createClient(SB_URL,SB_KEY);

let fornecedorData=null;
let abaAtiva='cotacoes';

function moeda(v){return v?'R$ '+Number(v).toFixed(2).replace('.',','):'—'}
function tempoAgo(dt){const d=Math.floor((Date.now()-new Date(dt))/60000);if(d<1)return'agora';if(d<60)return d+'min';const h=Math.floor(d/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}

// ── LOGIN ──────────────────────────────────────────────────
function renderLogin(erro){
  document.getElementById('app').innerHTML=`
    <div class="login-wrap">
      <div class="login-box">
        <div style="font-size:48px;margin-bottom:16px">🏪</div>
        <div class="login-title">Portal Fornecedor</div>
        <div class="login-sub">Entre com seu WhatsApp cadastrado</div>
        ${erro?`<div style="color:var(--red);font-size:13px;margin-bottom:12px;padding:10px;background:rgba(239,68,68,.1);border-radius:8px">${erro}</div>`:''}
        <div class="field"><label>Número WhatsApp</label><input id="login-tel" placeholder="61999990000" type="tel"></div>
        <div class="field"><label>Código de acesso</label><input id="login-code" placeholder="Enviado via WhatsApp" type="text"></div>
        <button class="btn-login" onclick="login()">Entrar →</button>
        <div style="font-size:12px;color:var(--t3);margin-top:16px">Não tem código? Peça ao responsável da oficina.</div>
      </div>
    </div>`;
}

async function login(){
  const tel=document.getElementById('login-tel').value.replace(/\D/g,'');
  const code=document.getElementById('login-code').value.trim();
  if(!tel){renderLogin('Digite seu WhatsApp');return;}
  const{data}=await sb.from('fornecedores').select('*').eq('whatsapp_consultor',tel).limit(1);
  if(!data||!data.length){renderLogin('Número não encontrado. Verifique com a oficina.');return;}
  fornecedorData=data[0];
  localStorage.setItem('forn_id',fornecedorData.id);
  localStorage.setItem('forn_tel',tel);
  renderPortal();
}

// ── PORTAL ─────────────────────────────────────────────────
async function renderPortal(){
  const savedId=localStorage.getItem('forn_id');
  if(!fornecedorData&&savedId){
    const{data}=await sb.from('fornecedores').select('*').eq('id',savedId).single();
    if(data)fornecedorData=data;
    else{renderLogin();return;}
  } else if(!fornecedorData){renderLogin();return;}

  document.getElementById('user-pill').style.display='flex';
  document.getElementById('user-avatar').textContent=fornecedorData.nome_fantasia?.charAt(0)||'F';
  document.getElementById('user-name').textContent=fornecedorData.nome_fantasia||'Fornecedor';

  document.getElementById('app').innerHTML=`
    <div class="tabs">
      <div class="tab active" id="tab-cotacoes" onclick="trocarAba('cotacoes')">Cotações</div>
      <div class="tab" id="tab-pedidos" onclick="trocarAba('pedidos')">Pedidos</div>
      <div class="tab" id="tab-catalogo" onclick="trocarAba('catalogo')">Catálogo</div>
      <div class="tab" id="tab-perfil" onclick="trocarAba('perfil')">Perfil</div>
    </div>
    <div class="content" id="tab-content"><div class="spinner"></div></div>`;

  carregarAba('cotacoes');

  // Realtime: nova cotação
  sb.channel('forn-'+fornecedorData.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'itens_os',filter:`fornecedor_id=eq.${fornecedorData.id}`},
      ()=>{ if(abaAtiva==='cotacoes')carregarAba('cotacoes'); })
    .subscribe();
}

function trocarAba(aba){
  abaAtiva=aba;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+aba)?.classList.add('active');
  carregarAba(aba);
}

async function carregarAba(aba){
  const c=document.getElementById('tab-content');
  if(!c)return;
  c.innerHTML='<div class="spinner"></div>';
  if(aba==='cotacoes')await renderCotacoes();
  else if(aba==='pedidos')await renderPedidos();
  else if(aba==='catalogo')await renderCatalogo();
  else if(aba==='perfil')await renderPerfil();
}

// ── COTAÇÕES ───────────────────────────────────────────────
async function renderCotacoes(){
  const{data:itens}=await sb.from('itens_os').select(`
    *,ordens_servico!inner(id,numero_os,modelo_veiculo,placa_veiculo,nome_cliente,tenant_id,
      tenants!inner(nome_oficina))
  `).eq('fornecedor_id',fornecedorData.id).eq('status_peca','A_COTAR').order('created_at',{ascending:false}).limit(20);

  const{data:respondidas}=await sb.from('itens_os').select('id').eq('fornecedor_id',fornecedorData.id).eq('status_peca','COTADO');
  const{data:pedidos}=await sb.from('itens_os').select('id').eq('fornecedor_id',fornecedorData.id).eq('status_peca','PEDIDO');

  const c=document.getElementById('tab-content');
  c.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Cotações abertas</div><div class="metric-val" style="color:var(--accent)">${itens?.length||0}</div></div>
      <div class="metric"><div class="metric-label">Respondidas</div><div class="metric-val" style="color:var(--green)">${respondidas?.length||0}</div></div>
      <div class="metric"><div class="metric-label">Pedidos ativos</div><div class="metric-val" style="color:var(--blue)">${pedidos?.length||0}</div></div>
      <div class="metric"><div class="metric-label">Score confiança</div><div class="metric-val" style="color:var(--green)">${fornecedorData.score_confianca||100}</div><div class="score-bar"><div class="score-fill" style="width:${fornecedorData.score_confianca||100}%"></div></div></div>
    </div>
    <div class="section-title">Cotações aguardando resposta</div>
    <div id="lista-cotacoes">
      ${!itens?.length?`<div class="empty"><div class="empty-icon">✅</div><div>Nenhuma cotação pendente</div></div>`:''}
    </div>`;

  // Agrupar por OS
  const porOS={};
  (itens||[]).forEach(i=>{
    const osId=i.ordens_servico.id;
    if(!porOS[osId])porOS[osId]={os:i.ordens_servico,pecas:[]};
    porOS[osId].pecas.push(i);
  });

  const lista=document.getElementById('lista-cotacoes');
  Object.values(porOS).forEach(({os,pecas})=>{
    const div=document.createElement('div');
    div.className='cotacao-card nova';
    div.innerHTML=`
      <div class="cotacao-header">
        <div>
          <div class="cotacao-titulo">OS #${os.numero_os} — ${os.modelo_veiculo||'Veículo'}</div>
          <div class="cotacao-meta">${os.tenants?.nome_oficina||'Oficina'} · ${os.placa_veiculo} · ${os.nome_cliente}</div>
        </div>
        <span class="badge badge-nova">Nova cotação</span>
      </div>
      <div class="pecas-list">
        ${pecas.map(p=>`
          <div class="peca-row">
            <span class="peca-nome">${p.descricao_peca}</span>
            <span class="peca-qtd">Qtd: ${p.quantidade}</span>
            <input class="peca-input" type="number" placeholder="R$ preço" id="preco-${p.id}" min="0" step="0.01">
            <input class="peca-prazo" type="text" placeholder="prazo" id="prazo-${p.id}" maxlength="20">
          </div>`).join('')}
      </div>
      <div class="resp-total">
        <span class="resp-total-label">Total estimado</span>
        <span class="resp-total-val" id="total-${os.id}">—</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="recusarCotacao('${os.id}')">Sem estoque</button>
        <button class="btn btn-primary" onclick="responderCotacao('${os.id}',[${pecas.map(p=>`'${p.id}'`).join(',')}])">Enviar cotação →</button>
      </div>`;
    lista.appendChild(div);

    // Calcular total ao digitar
    pecas.forEach(p=>{
      document.getElementById('preco-'+p.id)?.addEventListener('input',()=>{
        const total=pecas.reduce((a,pp)=>{
          const v=parseFloat(document.getElementById('preco-'+pp.id)?.value||0);
          return a+(v*(pp.quantidade||1));
        },0);
        document.getElementById('total-'+os.id).textContent=total>0?'R$ '+total.toFixed(2).replace('.',','):'—';
      });
    });
  });
}

async function responderCotacao(osId,pecaIds){
  const updates=[];
  for(const id of pecaIds){
    const preco=parseFloat(document.getElementById('preco-'+id)?.value||0);
    const prazo=document.getElementById('prazo-'+id)?.value||'A combinar';
    if(preco>0){
      updates.push(sb.from('itens_os').update({preco_custo:preco,preco_venda:preco*1.3,status_peca:'COTADO'}).eq('id',id));
    }
  }
  await Promise.all(updates);
  await carregarAba('cotacoes');
  alert('✅ Cotação enviada com sucesso!');
}

async function recusarCotacao(osId){
  const ids=[];
  document.querySelectorAll(`[id^="preco-"]`).forEach(el=>ids.push(el.id.replace('preco-','')));
  await Promise.all(ids.map(id=>sb.from('itens_os').update({status_peca:'RECUSADO'}).eq('id',id)));
  await carregarAba('cotacoes');
}

// ── PEDIDOS ─────────────────────────────────────────────────
async function renderPedidos(){
  const{data}=await sb.from('itens_os').select(`*,ordens_servico!inner(numero_os,modelo_veiculo,tenants!inner(nome_oficina))`).eq('fornecedor_id',fornecedorData.id).in('status_peca',['PEDIDO','COTADO']).order('created_at',{ascending:false});
  const c=document.getElementById('tab-content');
  c.innerHTML=`
    <div class="section-title">Pedidos em andamento</div>
    ${!data?.length?`<div class="empty"><div class="empty-icon">📦</div><div>Nenhum pedido ativo</div></div>`:''}
    ${(data||[]).map(i=>`
      <div class="cotacao-card">
        <div class="cotacao-header">
          <div>
            <div class="cotacao-titulo">${i.descricao_peca} (${i.quantidade}x)</div>
            <div class="cotacao-meta">OS #${i.ordens_servico.numero_os} · ${i.ordens_servico.tenants.nome_oficina}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:700;color:var(--accent)">${moeda(i.preco_venda*i.quantidade)}</div>
            <span class="badge" style="background:rgba(59,130,246,.15);color:var(--blue)">${i.status_peca}</span>
          </div>
        </div>
        ${i.status_peca==='PEDIDO'?`<button class="btn btn-primary" onclick="confirmarEntrega('${i.id}')">✅ Confirmar entrega</button>`:''}
      </div>`).join('')}`;
}

async function confirmarEntrega(id){
  await sb.from('itens_os').update({status_peca:'RECEBIDO'}).eq('id',id);
  await carregarAba('pedidos');
}

// ── CATÁLOGO ────────────────────────────────────────────────
async function renderCatalogo(){
  const c=document.getElementById('tab-content');
  c.innerHTML=`
    <div class="section-title">Seu catálogo de peças</div>
    <div class="cotacao-form" style="background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:14px">Adicionar peça ao catálogo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field"><label>Nome da peça</label><input id="cat-nome" placeholder="Ex: Pastilha de freio"></div>
        <div class="field"><label>Preço (R$)</label><input id="cat-preco" type="number" placeholder="0.00"></div>
        <div class="field"><label>Prazo entrega</label><input id="cat-prazo" placeholder="Ex: 2h, 1 dia"></div>
      </div>
      <button class="btn btn-primary" onclick="adicionarCatalogo()">+ Adicionar</button>
    </div>
    <div style="font-size:13px;color:var(--t3);text-align:center;padding:20px">
      Catálogo em desenvolvimento — em breve você poderá importar sua lista completa de peças.
    </div>`;
}

async function adicionarCatalogo(){
  alert('✅ Peça adicionada! (Funcionalidade completa em breve)');
}

// ── PERFIL ──────────────────────────────────────────────────
async function renderPerfil(){
  const c=document.getElementById('tab-content');
  c.innerHTML=`
    <div class="cotacao-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:16px">Seus dados</div>
      <div class="os-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">Nome fantasia</div><div style="font-size:15px">${fornecedorData.nome_fantasia||'—'}</div></div>
        <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">WhatsApp</div><div style="font-size:15px">${fornecedorData.whatsapp_consultor||'—'}</div></div>
        <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">Score de confiança</div><div style="font-size:22px;font-weight:700;color:var(--green)">${fornecedorData.score_confianca||100}/100</div></div>
        <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">Status</div><span class="badge badge-respondida">${fornecedorData.ativo?'Ativo':'Inativo'}</span></div>
      </div>
      <div style="margin-top:16px;padding:14px;background:var(--bg2);border-radius:8px">
        <div style="font-size:13px;color:var(--t3)">📈 <strong style="color:var(--t1)">Como aumentar seu score:</strong> Responda cotações rapidamente, entregue no prazo e forneça peças de qualidade. A IA monitora cada entrega e ajusta seu score automaticamente.</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="logout()" style="margin-top:12px">Sair</button>`;
}

function logout(){localStorage.removeItem('forn_id');localStorage.removeItem('forn_tel');fornecedorData=null;renderLogin();}

// ── INIT ────────────────────────────────────────────────────
const savedId=localStorage.getItem('forn_id');
if(savedId)renderPortal();else renderLogin();
</script>
</body>
</html>
