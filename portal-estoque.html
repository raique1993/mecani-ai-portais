<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Estoque — Mecani.AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f5f2;font-family:-apple-system,sans-serif;color:#1a1a1a}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:700}.logo em{color:#22c55e;font-style:normal}
.content{max-width:900px;margin:24px auto;padding:0 24px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.ml{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mv{font-size:24px;font-weight:700}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.ct{font-size:13px;font-weight:600;color:#374151}
.add-btn{padding:8px 16px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;color:#6b7280;font-weight:600;border-bottom:1px solid #f3f4f6}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f9fafb}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.ok{background:#ecfdf5;color:#059669}
.low{background:#fef2f2;color:#dc2626}
.warn{background:#fffbeb;color:#d97706}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none}
.btn-row{display:flex;gap:10px;margin-top:16px}
.save-btn{flex:1;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.cancel-btn{padding:12px 20px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;cursor:pointer}
.spin{width:24px;height:24px;border:2px solid #e5e7eb;border-top-color:#22c55e;border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Mecani<em>.AI</em> — Estoque</div>
  <button class="add-btn" onclick="abrirModal()">+ Adicionar item</button>
</div>
<div class="content">
  <div class="metrics" id="metrics"><div class="spin"></div></div>
  <div class="card">
    <div class="card-header"><span class="ct" id="titulo-tabela">Itens em estoque</span></div>
    <div id="tabela-wrap"><div class="spin"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Adicionar item ao estoque</h3>
    <div class="field"><label>Nome da peça *</label><input id="m-nome" placeholder="Ex: Pastilha de freio"></div>
    <div class="field"><label>Código/Referência</label><input id="m-cod" placeholder="Ex: PB-1234"></div>
    <div class="field"><label>Categoria</label>
      <select id="m-cat">
        <option>Freios</option><option>Motor</option><option>Suspensão</option>
        <option>Elétrica</option><option>Filtros</option><option>Outros</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Quantidade *</label><input id="m-qtd" type="number" value="0" min="0"></div>
      <div class="field"><label>Qtd mínima</label><input id="m-min" type="number" value="2" min="0"></div>
      <div class="field"><label>Preço custo (R$)</label><input id="m-custo" type="number" step="0.01" value="0"></div>
      <div class="field"><label>Preço venda (R$)</label><input id="m-venda" type="number" step="0.01" value="0"></div>
    </div>
    <div class="field"><label>Localização no estoque</label><input id="m-local" placeholder="Ex: Prateleira A3"></div>
    <div class="btn-row">
      <button class="cancel-btn" onclick="fecharModal()">Cancelar</button>
      <button class="save-btn" onclick="salvar()">Salvar item</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://tcjynyfusqkqtdohnyzq.supabase.co';
const SB_KEY='sb_publishable_gNJhc4WCS9MnnmDAL2T6Vg_AQ71_Vid';
const TENANT='a1b2c3d4-0000-0000-0000-000000000001';
const{createClient}=supabase;const sb=createClient(SB_URL,SB_KEY);

async function carregar(){
  const{data:itens}=await sb.from('estoque').select('*').eq('tenant_id',TENANT).order('nome');
  const total=itens?.length||0;
  const criticos=(itens||[]).filter(i=>i.quantidade<=i.quantidade_minima).length;
  const semEstoque=(itens||[]).filter(i=>i.quantidade===0).length;
  const valorTotal=(itens||[]).reduce((a,i)=>a+(i.quantidade||0)*(i.preco_custo||0),0);

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="ml">Total de itens</div><div class="mv">${total}</div></div>
    <div class="metric"><div class="ml">Estoque crítico</div><div class="mv" style="color:#dc2626">${criticos}</div></div>
    <div class="metric"><div class="ml">Sem estoque</div><div class="mv" style="color:#dc2626">${semEstoque}</div></div>
    <div class="metric"><div class="ml">Valor em estoque</div><div class="mv" style="color:#059669">R$ ${valorTotal.toFixed(2).replace('.',',')}</div></div>`;

  document.getElementById('titulo-tabela').textContent=`Itens em estoque (${total})`;
  document.getElementById('tabela-wrap').innerHTML=`
    <table>
      <thead><tr><th>Nome</th><th>Código</th><th>Categoria</th><th>Qtd</th><th>Custo</th><th>Venda</th><th>Status</th></tr></thead>
      <tbody>
        ${(itens||[]).map(i=>{
          const st=i.quantidade===0?'<span class="badge low">Sem estoque</span>':i.quantidade<=i.quantidade_minima?'<span class="badge warn">Baixo</span>':'<span class="badge ok">OK</span>';
          return`<tr><td><strong>${i.nome}</strong>${i.localizacao?'<br><span style="font-size:11px;color:#9ca3af">'+i.localizacao+'</span>':''}</td><td style="color:#9ca3af">${i.codigo||'—'}</td><td>${i.categoria||'—'}</td><td><strong>${i.quantidade}</strong><span style="color:#9ca3af;font-size:12px"> / min:${i.quantidade_minima}</span></td><td>R$ ${(i.preco_custo||0).toFixed(2).replace('.',',')}</td><td>R$ ${(i.preco_venda||0).toFixed(2).replace('.',',')}</td><td>${st}</td></tr>`;
        }).join('')||'<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">Nenhum item cadastrado. Adicione o primeiro item!</td></tr>'}
      </tbody>
    </table>`;
}

function abrirModal(){document.getElementById('modal-bg').classList.add('open');}
function fecharModal(){document.getElementById('modal-bg').classList.remove('open');}

async function salvar(){
  const nome=document.getElementById('m-nome').value.trim();
  if(!nome){alert('Informe o nome da peça.');return;}
  await sb.from('estoque').insert({
    tenant_id:TENANT,nome,codigo:document.getElementById('m-cod').value||null,
    categoria:document.getElementById('m-cat').value,
    quantidade:parseInt(document.getElementById('m-qtd').value)||0,
    quantidade_minima:parseInt(document.getElementById('m-min').value)||2,
    preco_custo:parseFloat(document.getElementById('m-custo').value)||0,
    preco_venda:parseFloat(document.getElementById('m-venda').value)||0,
    localizacao:document.getElementById('m-local').value||null,
  });
  fecharModal();carregar();
}

carregar();

// Realtime
sb.channel('estoque-rt').on('postgres_changes',{event:'*',schema:'public',table:'estoque'},carregar).subscribe();
</script>
</body>
</html>
