<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Mecani.AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#050505;--bg1:#111;--bg2:#1a1a1a;--bg3:#252525;--t1:#f0ede8;--t2:#999;--t3:#555;--accent:#e8ff47;--blue:#60a5fa;--green:#4ade80;--red:#f87171;--amber:#fbbf24;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid #1a1a1a}
.logo{font-family:'SF Pro Display',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px}.logo em{color:var(--accent);font-style:normal}
.admin-badge{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.3);color:var(--accent);font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;letter-spacing:1px;text-transform:uppercase}
.sidebar{position:fixed;left:0;top:65px;bottom:0;width:200px;border-right:1px solid var(--bg3);padding:20px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .15s}
.nav-item:hover{color:var(--t1);background:var(--bg2)}
.nav-item.active{color:var(--t1);background:var(--bg2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:200px;padding:28px 32px;max-width:1200px}
.page-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:32px}
.kpi{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:18px}
.kpi-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-delta{font-size:12px;color:var(--t3)}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}
.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.table{width:100%;border-collapse:collapse}
.table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bg3)}
.table td{padding:12px 14px;font-size:14px;border-bottom:1px solid #111}
.table tr:hover td{background:var(--bg1)}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.pill-green{background:rgba(74,222,128,.1);color:var(--green)}
.pill-amber{background:rgba(251,191,36,.1);color:var(--amber)}
.pill-red{background:rgba(248,113,113,.1);color:var(--red)}
.pill-blue{background:rgba(96,165,250,.1);color:var(--blue)}
.activity-list{display:flex;flex-direction:column;gap:8px}
.activity-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg1);border-radius:8px;border:1px solid var(--bg3)}
.activity-icon{font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:8px}
.activity-text{flex:1;font-size:13px}
.activity-text span{color:var(--t3)}
.activity-time{font-size:11px;color:var(--t3)}
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.health-card{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:16px}
.health-label{font-size:12px;color:var(--t3);margin-bottom:8px}
.health-status{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.dot-green{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-amber{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot-red{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red)}
.spinner{width:32px;height:32px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.revenue-chart{height:120px;display:flex;align-items:flex-end;gap:6px;padding:12px 0}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:rgba(232,255,71,.3);border-radius:4px 4px 0 0;min-height:4px;transition:height .5s}
.bar.today{background:var(--accent)}
.bar-label{font-size:10px;color:var(--t3)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Mecani<em>.AI</em></div>
  <div class="admin-badge">Admin</div>
</div>

<div class="sidebar">
  <div class="nav-item active" onclick="nav('overview')"><span class="nav-icon">📊</span>Overview</div>
  <div class="nav-item" onclick="nav('oficinas')"><span class="nav-icon">🏪</span>Oficinas</div>
  <div class="nav-item" onclick="nav('receita')"><span class="nav-icon">💰</span>Receita</div>
  <div class="nav-item" onclick="nav('ia')"><span class="nav-icon">🤖</span>Uso da IA</div>
  <div class="nav-item" onclick="nav('saude')"><span class="nav-icon">❤️</span>Saúde do Sistema</div>
</div>

<div class="main" id="main">
  <div class="spinner"></div>
</div>

<script>
const SB_URL='https://tcjynyfusqkqtdohnyzq.supabase.co';
const SB_KEY='sb_publishable_gNJhc4WCS9MnnmDAL2T6Vg_AQ71_Vid';
const{createClient}=supabase;
const sb=createClient(SB_URL,SB_KEY);

let abaAtiva='overview';

function nav(aba){
  abaAtiva=aba;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderAba(aba);
}

function moeda(v){return v?'R$ '+Number(v).toFixed(2).replace('.',','):'R$ 0,00'}
function tempoAgo(dt){if(!dt)return'—';const d=Math.floor((Date.now()-new Date(dt))/60000);if(d<1)return'agora';if(d<60)return d+'min';const h=Math.floor(d/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}

async function renderAba(aba){
  const m=document.getElementById('main');
  if(aba==='overview')await renderOverview();
  else if(aba==='oficinas')await renderOficinas();
  else if(aba==='receita')await renderReceita();
  else if(aba==='ia')await renderIA();
  else if(aba==='saude')await renderSaude();
}

async function renderOverview(){
  const[{data:tenants},{data:os},{data:caixa},{data:nps},{data:posts}]=await Promise.all([
    sb.from('tenants').select('id,nome_oficina,ativo,created_at').order('created_at',{ascending:false}),
    sb.from('ordens_servico').select('id,status,valor_total,created_at'),
    sb.from('fluxo_caixa').select('tipo,valor,data_competencia'),
    sb.from('avaliacoes_nps').select('nota').eq('respondido',true),
    sb.from('social_posts').select('id,status').eq('status','PUBLICADO'),
  ]);

  const totalReceita=caixa?.filter(c=>c.tipo==='ENTRADA').reduce((a,c)=>a+c.valor,0)||0;
  const totalOS=os?.length||0;
  const osAbertas=os?.filter(o=>!['CONCLUIDO','CANCELADO'].includes(o.status)).length||0;
  const npsMedia=nps?.length?Math.round(nps.reduce((a,n)=>a+(n.nota||0),0)/nps.length*10)/10:0;

  // Receita últimos 7 dias
  const hoje=new Date();
  const dias=Array.from({length:7},(_,i)=>{
    const d=new Date(hoje);d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];
  });
  const receitaDia=dias.map(d=>caixa?.filter(c=>c.tipo==='ENTRADA'&&c.data_competencia===d).reduce((a,c)=>a+c.valor,0)||0);
  const maxRec=Math.max(...receitaDia,1);

  document.getElementById('main').innerHTML=`
    <div class="page-title">Overview da Plataforma</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Oficinas ativas</div><div class="kpi-val" style="color:var(--accent)">${tenants?.filter(t=>t.ativo).length||0}</div><div class="kpi-delta up">↑ Total: ${tenants?.length||0}</div></div>
      <div class="kpi"><div class="kpi-label">Total de OS</div><div class="kpi-val" style="color:var(--blue)">${totalOS}</div><div class="kpi-delta">${osAbertas} abertas</div></div>
      <div class="kpi"><div class="kpi-label">Receita total</div><div class="kpi-val" style="color:var(--green)">${moeda(totalReceita)}</div><div class="kpi-delta up">todas as oficinas</div></div>
      <div class="kpi"><div class="kpi-label">NPS médio</div><div class="kpi-val" style="color:var(--amber)">${npsMedia||'—'}</div><div class="kpi-delta">${nps?.length||0} avaliações</div></div>
      <div class="kpi"><div class="kpi-label">Posts publicados</div><div class="kpi-val" style="color:var(--accent)">${posts?.length||0}</div><div class="kpi-delta">via Social IA</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px">
      <div class="section">
        <div class="section-header"><div class="section-title">Receita — últimos 7 dias</div></div>
        <div style="background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:16px">
          <div class="revenue-chart">
            ${dias.map((d,i)=>`
              <div class="bar-wrap">
                <div class="bar ${i===6?'today':''}" style="height:${Math.max(4,(receitaDia[i]/maxRec)*80)}px" title="${moeda(receitaDia[i])}"></div>
                <div class="bar-label">${new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short'})}</div>
              </div>`).join('')}
          </div>
          <div style="text-align:center;font-size:12px;color:var(--t3);margin-top:4px">Barra amarela = hoje</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header"><div class="section-title">Atividade recente</div></div>
        <div class="activity-list" id="activity">
          ${(os||[]).slice(0,5).map(o=>`
            <div class="activity-item">
              <div class="activity-icon">${{EM_DIAGNOSTICO:'🔍',AGUARDANDO_APROVACAO:'📋',EM_EXECUCAO:'🔧',CONCLUIDO:'✅',CANCELADO:'❌'}[o.status]||'🔧'}</div>
              <div class="activity-text">OS aberta <span>· ${o.status}</span></div>
              <div class="activity-time">${tempoAgo(o.created_at)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-title">Oficinas cadastradas</div></div>
      <table class="table">
        <thead><tr><th>Oficina</th><th>Status</th><th>OS abertas</th><th>Receita</th><th>Cadastro</th></tr></thead>
        <tbody>
          ${(tenants||[]).map(t=>{
            const osT=os?.filter(o=>o.tenant_id===t.id)||[];
            const abertas=osT.filter(o=>!['CONCLUIDO','CANCELADO'].includes(o.status)).length;
            const recT=caixa?.filter(c=>c.tenant_id===t.id&&c.tipo==='ENTRADA').reduce((a,c)=>a+c.valor,0)||0;
            return`<tr>
              <td style="font-weight:600">${t.nome_oficina}</td>
              <td><span class="pill ${t.ativo?'pill-green':'pill-red'}">${t.ativo?'Ativa':'Inativa'}</span></td>
              <td>${abertas}</td>
              <td style="color:var(--green)">${moeda(recT)}</td>
              <td style="color:var(--t3)">${new Date(t.created_at).toLocaleDateString('pt-BR')}</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
}

async function renderSaude(){
  document.getElementById('main').innerHTML=`
    <div class="page-title">Saúde do Sistema</div>
    <div class="health-grid">
      ${[
        {label:'Supabase — Banco de dados',status:'online',dot:'dot-green'},
        {label:'Edge Functions (13 ativas)',status:'online',dot:'dot-green'},
        {label:'Evolution API — WhatsApp',status:'online',dot:'dot-green'},
        {label:'Vercel — Dashboard',status:'online',dot:'dot-green'},
        {label:'Gemini 2.0 Flash — IA',status:'online',dot:'dot-green'},
        {label:'Cron Jobs (NPS, Relatório)',status:'online',dot:'dot-green'},
      ].map(s=>`
        <div class="health-card">
          <div class="health-label">${s.label}</div>
          <div class="health-status"><div class="${s.dot}"></div>${s.status==='online'?'Operacional':'Verificar'}</div>
        </div>`).join('')}
    </div>
    <div style="margin-top:24px;padding:20px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r)">
      <div class="section-title" style="margin-bottom:12px">Edge Functions ativas</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${['checkin-v2','cotacao','aprovacao','conclusao','nps','agendamento','social','orchestrator','relatorio-semanal','crm-preventivo','twilio-webhook','checkin','setup-evolution'].map(f=>`
          <span style="padding:4px 12px;background:rgba(74,222,128,.1);color:var(--green);border-radius:100px;font-size:12px;font-weight:600">${f}</span>`).join('')}
      </div>
    </div>`;
}

async function renderOficinas(){
  const{data:tenants}=await sb.from('tenants').select('*').order('created_at',{ascending:false});
  document.getElementById('main').innerHTML=`
    <div class="page-title">Gerenciar Oficinas</div>
    <table class="table">
      <thead><tr><th>Nome</th><th>CNPJ</th><th>Telefone</th><th>Vagas</th><th>Plano</th><th>Status</th></tr></thead>
      <tbody>
        ${(tenants||[]).map(t=>`<tr>
          <td style="font-weight:600">${t.nome_oficina}</td>
          <td style="color:var(--t3)">${t.cnpj||'—'}</td>
          <td>${t.telefone||'—'}</td>
          <td>${t.vagas_simultaneas||5}</td>
          <td><span class="pill pill-blue">${t.plano||'trial'}</span></td>
          <td><span class="pill ${t.ativo?'pill-green':'pill-red'}">${t.ativo?'Ativa':'Inativa'}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function renderReceita(){
  const{data:caixa}=await sb.from('fluxo_caixa').select('*,tenants!inner(nome_oficina)').order('data_competencia',{ascending:false}).limit(100);
  const total=caixa?.filter(c=>c.tipo==='ENTRADA').reduce((a,c)=>a+c.valor,0)||0;
  document.getElementById('main').innerHTML=`
    <div class="page-title">Receita Consolidada</div>
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="kpi-label">Total entradas</div><div class="kpi-val" style="color:var(--green)">${moeda(total)}</div></div>
      <div class="kpi"><div class="kpi-label">Total saídas</div><div class="kpi-val" style="color:var(--red)">${moeda(caixa?.filter(c=>c.tipo==='SAIDA').reduce((a,c)=>a+c.valor,0)||0)}</div></div>
      <div class="kpi"><div class="kpi-label">Saldo bruto</div><div class="kpi-val" style="color:var(--accent)">${moeda(total-(caixa?.filter(c=>c.tipo==='SAIDA').reduce((a,c)=>a+c.valor,0)||0))}</div></div>
    </div>
    <table class="table">
      <thead><tr><th>Data</th><th>Descrição</th><th>Oficina</th><th>Tipo</th><th>Valor</th></tr></thead>
      <tbody>
        ${(caixa||[]).map(c=>`<tr>
          <td style="color:var(--t3)">${new Date(c.data_competencia+'T12:00').toLocaleDateString('pt-BR')}</td>
          <td>${c.descricao}</td>
          <td style="color:var(--t3)">${c.tenants?.nome_oficina||'—'}</td>
          <td><span class="pill ${c.tipo==='ENTRADA'?'pill-green':'pill-red'}">${c.tipo}</span></td>
          <td style="font-weight:700;color:${c.tipo==='ENTRADA'?'var(--green)':'var(--red)'}">${c.tipo==='SAIDA'?'-':''}${moeda(c.valor)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function renderIA(){
  const[{data:diag},{data:posts},{data:nps},{data:com}]=await Promise.all([
    sb.from('diagnosticos').select('id,created_at').order('created_at',{ascending:false}).limit(5),
    sb.from('social_posts').select('id,tipo,estilo,status,created_at').order('created_at',{ascending:false}).limit(10),
    sb.from('avaliacoes_nps').select('nota,created_at').eq('respondido',true).order('created_at',{ascending:false}).limit(10),
    sb.from('comunicacoes').select('tipo,created_at').order('created_at',{ascending:false}).limit(20),
  ]);
  const tipos={};
  (com||[]).forEach(c=>{tipos[c.tipo]=(tipos[c.tipo]||0)+1;});
  document.getElementById('main').innerHTML=`
    <div class="page-title">Uso da Inteligência Artificial</div>
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi"><div class="kpi-label">Diagnósticos IA</div><div class="kpi-val" style="color:var(--accent)">${diag?.length||0}</div></div>
      <div class="kpi"><div class="kpi-label">Posts criados</div><div class="kpi-val" style="color:var(--blue)">${posts?.length||0}</div></div>
      <div class="kpi"><div class="kpi-label">NPS processados</div><div class="kpi-val" style="color:var(--green)">${nps?.length||0}</div></div>
      <div class="kpi"><div class="kpi-label">Msgs enviadas</div><div class="kpi-val" style="color:var(--amber)">${com?.length||0}</div></div>
    </div>
    <div style="background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;margin-bottom:20px">
      <div class="section-title" style="margin-bottom:14px">Mensagens por tipo</div>
      ${Object.entries(tipos).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <div style="font-size:13px;min-width:200px;color:var(--t2)">${t}</div>
          <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
            <div style="height:100%;background:var(--accent);opacity:.7;width:${Math.min(100,n/Math.max(...Object.values(tipos))*100)}%;transition:width .5s"></div>
          </div>
          <div style="font-size:13px;font-weight:600;min-width:24px;text-align:right">${n}</div>
        </div>`).join('')}
    </div>`;
}

renderAba('overview');
</script>
</body>
</html>
